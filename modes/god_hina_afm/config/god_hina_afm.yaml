#config_version=6

#god_hina

mode:
  start_events: ball_starting
  priority: 625

#---------------------------------------------------------------------------------------------

counters:
  godhina_counter:
    starting_count: 0
    direction: up
    count_complete_value: 4                 # Complete on the 4th hit
    count_events: s_hina_active
    persist_state: true
    reset_on_complete: false
    disable_on_complete: true                # Stop counting after 4
    events_when_hit: godhina_hit               # Posted after every hit
    events_when_complete: godhina_complete     # Posted only on 4th hit
    #reset_events: reset_godhina
    enable_events: mode_god_hina_afm_starting

#---------------------------------------------------------------------------------------------

timers:
  hina_timer:
    start_value: 15
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - event: start_hina
        action: start
      - event: collect_hina
        action: stop

#---------------------------------------------------------------------------------------------

event_player:
  # Start hurry-up on 4th hit (counter complete)
  godhina_complete:
    - start_hina

  # Jackpot when scoop is hit while timer is running
  s_scoop_active{device.timers.hina_timer.running}:
    - collect_hina

#---------------------------------------------------------------------------------------------
      
variable_player:
  mode_god_hina_afm_starting:
    hina_started:
      int: 0
      action: set
  start_hina:
    hina_started:
      int: 1
      action: set
  collect_hina:
    score:
      int: 50000 * current_player.pf_multiplier 
      action: add

#---------------------------------------------------------------------------------------------

light_player:
  mode_god_hina_afm_starting:
    l_led_196: off
    l_led_199: off
    l_led_202: off
    l_led_190: off
    l_led_193: off

  godhina_hit{device.counters.godhina_counter.value==1}:   #  ff1493   deeppink
    l_led_196: ff1493
  godhina_hit{device.counters.godhina_counter.value==2}:
    l_led_199: ff1493
  godhina_hit{device.counters.godhina_counter.value==3}:
    l_led_202: ff1493

  start_hina:
    l_led_190: ff1493
    l_led_193: ff1493


  # AI Gave me this code #
  ## ──────────────────────────────
  ## Restore God Hina lights when mode starts on a new ball
  ## ──────────────────────────────

  # 1st hit light – stays on forever once earned
  mode_god_hina_afm_started{device.counters.godhina_counter.value >= 1}:
    l_led_196: ff1493

  mode_god_hina_afm_started{device.counters.godhina_counter.value < 1}:
    l_led_196: off

  # 2nd hit light
  mode_god_hina_afm_started{device.counters.godhina_counter.value >= 2}:
    l_led_199: ff1493

  mode_god_hina_afm_started{device.counters.godhina_counter.value < 2}:
    l_led_199: off

  # 3rd hit light
  mode_god_hina_afm_started{device.counters.godhina_counter.value >= 3}:
    l_led_202: ff1493

  mode_god_hina_afm_started{device.counters.godhina_counter.value < 3}:
    l_led_202: off

  # Scoop arrows solid pink when hurry-up is active or already collected this ball
  mode_god_hina_afm_started{current_player.hina_started == 1 or device.timers.hina_timer.running}:
    l_led_190: ff1493
    l_led_193: ff1493

  # Scoop arrows off when we haven't reached the hurry-up yet
  mode_god_hina_afm_started{current_player.hina_started == 0 and not device.timers.hina_timer.running}:
    l_led_190: off
    l_led_193: off

#---------------------------------------------------------------------------------------------

show_player:
  # Start blinking arrowhina after 3rd hit
  godhina_hit{device.counters.godhina_counter.value==3}:
    arrowhina_blink:
      loops: -1

  # Stop blinking (solid) when hurry-up starts
  start_hina:
    arrowhina_blink: stop
    scoophina_blink:
      loops: 14
  # Flash allhina lights on jackpot
  collect_hina:
    allhina_blink:
      loops: 0
    scoophina_blink: stop
  
    hina_award:
      speed: 50
      loops: 0

  # AI Gave me this code #
  # ← keep everything you already have in show_player →

  # NEW: Restore blinking state when mode starts on a new ball
  mode_god_hina_afm_started{device.counters.godhina_counter.value == 3 and current_player.hina_started == 0}:
    arrowhina_blink:
      loops: -1

  # Always stop the scoop blink on mode start (no condition needed — it's safe to always run)
  mode_god_hina_afm_started:
    scoophina_blink: stop

#---------------------------------------------------------------------------------------------

shows:
  arrowhina_blink:
    - duration: 0.5
      lights:
        l_led_190: ff1493
        l_led_193: off
    - duration: 0.5
      lights:
        l_led_190: off
        l_led_193: ff1493
  scoophina_blink:
    - duration: 0.5
      lights:
        l_led_208: ff1493
    - duration: 0.5
      lights:
        l_led_208: off

  allhina_blink:
    - duration: 0.25
      lights:
        l_led_196: off
        l_led_199: off
        l_led_202: off
        l_led_190: off
        l_led_193: off
    - duration: 0.25
      lights:
        l_led_196: ff1493
        l_led_199: ff1493
        l_led_202: ff1493
        l_led_190: ff1493
        l_led_193: ff1493
    - duration: 0.25
      lights:
        l_led_196: off
        l_led_199: off
        l_led_202: off
        l_led_190: off
        l_led_193: off
    - duration: 0.25
      lights:
        l_led_196: ff1493
        l_led_199: ff1493
        l_led_202: ff1493
        l_led_190: ff1493
        l_led_193: ff1493