#config_version=6

#god_ku_afm

mode:
  start_events: ball_starting
  #stop_events: ball_ending
  priority: 700

#---------------------------------------------------------------------------------------------

counters:
  godku_counter:
    starting_count: 0
    direction: up
    count_complete_value: 4                 # Complete on the 4th hit
    count_events: s_ramp_back_active
    persist_state: true
    reset_on_complete: false
    disable_on_complete: true                # Stop counting after 4
    events_when_hit: godku_hit               # Posted after every hit
    events_when_complete: godku_complete     # Posted only on 4th hit
    #reset_events: reset_godku    
    enable_events: mode_god_ku_afm_starting

#---------------------------------------------------------------------------------------------

timers:
  ku_timer:
    start_value: 15
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - event: start_ku
        action: start
      - event: collect_ku
        action: stop

#---------------------------------------------------------------------------------------------

event_player:
  # Start hurry-up on 4th hit (counter complete)
  godku_complete:
    - start_ku

  # Jackpot when scoop is hit while timer is running
  s_scoop_active{device.timers.ku_timer.running}:
    - collect_ku

#---------------------------------------------------------------------------------------------

variable_player:
  mode_god_ku_afm_starting:
    ku_started:
      int: 0
      action: set
  start_ku:
    ku_started:
      int: 1
      action: set
  collect_ku:
    score:
      int: 50000 * current_player.pf_multiplier 
      action: add

#---------------------------------------------------------------------------------------------

light_player:
  mode_god_ku_afm_starting:
    l_led_142: off
    l_led_145: off
    l_led_148: off
    l_led_151: off
    l_led_154: off

  godku_hit{device.counters.godku_counter.value==1}:    # 0000ff  -  SkyBlue
    l_led_142: 0000ff
  godku_hit{device.counters.godku_counter.value==2}:
    l_led_145: 0000ff
  godku_hit{device.counters.godku_counter.value==3}:
    l_led_148: 0000ff

  start_ku:
    l_led_151: 0000ff
    l_led_154: 0000ff

  # AI Gave me this code #
  ## ──────────────────────────────
  ## Restore God ku lights when mode starts on a new ball
  ## ──────────────────────────────

  # 1st hit light – stays on forever once earned
  mode_god_ku_afm_started{device.counters.godku_counter.value >= 1}:
    l_led_142: 0000ff

  mode_god_ku_afm_started{device.counters.godku_counter.value < 1}:
    l_led_142: off

  # 2nd hit light
  mode_god_ku_afm_started{device.counters.godku_counter.value >= 2}:
    l_led_145: 0000ff

  mode_god_ku_afm_started{device.counters.godku_counter.value < 2}:
    l_led_145: off

  # 3rd hit light
  mode_god_ku_afm_started{device.counters.godku_counter.value >= 3}:
    l_led_148: 0000ff

  mode_god_ku_afm_started{device.counters.godku_counter.value < 3}:
    l_led_148: off

  # Scoop arrows solid pink when hurry-up is active or already collected this ball
  mode_god_ku_afm_started{current_player.ku_started == 1 or device.timers.ku_timer.running}:
    l_led_151: 0000ff
    l_led_154: 0000ff

  # Scoop arrows off when we haven't reached the hurry-up yet
  mode_god_ku_afm_started{current_player.ku_started == 0 and not device.timers.ku_timer.running}:
    l_led_151: off
    l_led_154: off

#---------------------------------------------------------------------------------------------

show_player:
  # Start blinking arrowku after 3rd hit
  godku_hit{device.counters.godku_counter.value==3}:
    arrowku_blink:
      loops: -1

  # Stop blinking (solid) when hurry-up starts
  start_ku:
    arrowku_blink: stop
    scoopku_blink:
      loops: 14
  # Flash allku lights on jackpot
  collect_ku:
    allku_blink:
      loops: 0
    scoopku_blink: stop

    ku_award:
      speed: 50
      loops: 0

  # AI Gave me this code #
  # ← keep everything you already have in show_player →

  # NEW: Restore blinking state when mode starts on a new ball
  mode_god_ku_afm_started{device.counters.godku_counter.value == 3 and current_player.ku_started == 0}:
    arrowku_blink:
      loops: -1

  # Always stop the scoop blink on mode start (no condition needed — it's safe to always run)
  mode_god_ku_afm_started:
    scoopku_blink: stop

#---------------------------------------------------------------------------------------------

shows:
  arrowku_blink:
    - duration: 0.5
      lights:
        l_led_151: 0000ff
        l_led_154: off
    - duration: 0.5
      lights:
        l_led_151: off
        l_led_154: 0000ff
  scoopku_blink:
    - duration: 0.5
      lights:
        l_led_208: 0000ff
    - duration: 0.5
      lights:
        l_led_208: off

  allku_blink:
    - duration: 0.25
      lights:
        l_led_142: off
        l_led_145: off
        l_led_148: off
        l_led_151: off
        l_led_154: off
    - duration: 0.25
      lights:
        l_led_142: 0000ff
        l_led_145: 0000ff
        l_led_148: 0000ff
        l_led_151: 0000ff
        l_led_154: 0000ff
    - duration: 0.25
      lights:
        l_led_142: off
        l_led_145: off
        l_led_148: off
        l_led_151: off
        l_led_154: off
    - duration: 0.25
      lights:
        l_led_142: 0000ff
        l_led_145: 0000ff
        l_led_148: 0000ff
        l_led_151: 0000ff
        l_led_154: 0000ff