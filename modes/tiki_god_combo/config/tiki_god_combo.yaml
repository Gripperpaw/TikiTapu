#config_version=6

#tiki_god_combo

mode:
  start_events: scoop_tiki_god_combo 
  stop_events: finished_tiki_gods_complete, timer_tgc_timer_complete, mode_tiki_god_combo_stopped, ball_ending #, mode_bonus_started
  priority: 775                                                                 #has to be higher than the god_afm modes for light shows to work
  events_when_stopped: play_base_music_again, reset_multiball_engaged, reset_tiki_god_combo_active      #added both reser to base, ball drain wasn't resetting these.    
  events_when_started: set_multiball_engaged, set_tiki_god_combo_active                                   

#-----------------------------------------------------------------------------------------------

state_machines:
  hina_ku_kanaloa:
    states:
      start:
        label: Start state #hina shot
      step1:
        label: #ramp back shot
        events_when_started: ramp_back_blinking_show
        events_when_stopped: ramp_back_blinking_show_stop
      step2:
        label: #loop top shot
        events_when_started: loop_top_blinking_show
        events_when_stopped: loop_top_blinking_show_stop

    transitions:
      - events: s_hina_active
        source: start
        target: step1
        events_when_transitioning: reset_combo_timer
      - source: step1
        target: step2
        events: s_ramp_back_active
      - source: step2
        target: start
        events: s_loop_top_active, state_machine_reset
        events_when_transitioning: hina_ku_kanaloa_complete
      - source: step1, step2 #timer block
        target: start
        events: timer_combo_timer_complete

  ku_kane_hina:
    states:
      start:
        label: Start state #ku ramp back shot
      step1:
        label: #loop left shot
        # show_when_active:                       not needed for show_player
        #   show: on #loop_left_blinking_show
        events_when_started: loop_left_blinking_show
        events_when_stopped: loop_left_blinking_show_stop

      step2:
        label: #hina shot
        # show_when_active:                       not needed for show_player
        #   show: on #hina_blinking_show
        events_when_started: hina_blinking_show
        events_when_stopped: hina_blinking_show_stop

    transitions:
      - events: s_ramp_back_active
        source: start
        target: step1
        events_when_transitioning: reset_combo_timer
      - source: step1
        target: step2
        events: s_loop_left_active
      - source: step2
        target: start
        events: s_hina_active, state_machine_reset
        events_when_transitioning: ku_kane_hina_complete
      - source: step1, step2 #timer block
        target: start
        events: timer_combo_timer_complete

  lano_x3:
    states:
      start:
        label: Start state #lano shot left ramp
      step1:
        label: #left ramp shot
        events_when_started: left_ramp_blinking_show
        events_when_stopped: left_ramp_blinking_show_stop
      step2:
        label: #left ramp shot
        events_when_started: left_ramp_blinking_show
        events_when_stopped: left_ramp_blinking_show_stop

    transitions:
      - events: s_left_ramp_active
        source: start
        target: step1
        events_when_transitioning: reset_combo_timer
      - source: step1
        target: step2
        events: s_left_ramp_active
      - source: step2
        target: start
        events: s_left_ramp_active, state_machine_reset
        events_when_transitioning: lano_x3_complete
      - source: step1, step2 #timer block
        target: start
        events: timer_combo_timer_complete

  kane_lano:
    states:
      start:
        label: Start state #kane shot
      step1:
        label: #left ramp shot
        events_when_started: left_ramp_blinking_show
        events_when_stopped: left_ramp_blinking_show_stop

    transitions:
      - events: s_loop_left_active
        source: start
        target: step1
        events_when_transitioning: reset_combo_timer
      - source: step1
        target: start
        events: s_left_ramp_active, state_machine_reset
        events_when_transitioning: kane_lano_complete
      - source: step1 #timer block
        target: start
        events: timer_combo_timer_complete

  kanaloa_kane:
    states:
      start:
        label: Start state #kanaloa shot
      step1:
        label: #loop left shot
        events_when_started: loop_left_blinking_show
        events_when_stopped: loop_left_blinking_show_stop

    transitions:
      - events: s_loop_top_active
        source: start
        target: step1
        events_when_transitioning: reset_combo_timer
      - source: step1
        target: start
        events: s_loop_left_active, state_machine_reset
        events_when_transitioning: kanaloa_kane_complete
      - source: step1 #timer block
        target: start
        events: timer_combo_timer_complete

  hina_kane:
    states:
      start:
        label: Start state #hina shot
      step1:
        label: #loop left shot
        events_when_started: loop_left_blinking_show
        events_when_stopped: loop_left_blinking_show_stop

    transitions:
      - events: s_hina_active
        source: start
        target: step1
        events_when_transitioning: reset_combo_timer
      - source: step1
        target: start
        events: s_loop_left_active, state_machine_reset
        events_when_transitioning: hina_kane_complete
      - source: step1 #timer block
        target: start
        events: timer_combo_timer_complete

  lano_hina:
    states:
      start:
        label: Start state #lano shot
      step1:
        label: #hina shot
        events_when_started: hina_blinking_show
        events_when_stopped: hina_blinking_show_stop

    transitions:
      - events: s_left_ramp_active
        source: start
        target: step1
        events_when_transitioning: reset_combo_timer
      - source: step1
        target: start
        events: s_hina_active, state_machine_reset
        events_when_transitioning: lano_hina_complete
      - source: step1 #timer block
        target: start
        events: timer_combo_timer_complete

