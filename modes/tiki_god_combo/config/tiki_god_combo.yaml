#-----------------------------------------------------------------------------------------------

coil_player:
  mode_tiki_god_combo_started: c_trap_release

#-----------------------------------------------------------------------------------------------

timers:
  tgc_timer:                                           #tiki_god_combo_tgc_timer_tick
    start_value: 78                                    #78s to complete 2 different combos            
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - action: start
        event: mode_tiki_god_combo_started
      # - action: reset                                #removed, no reset on the 78 second timer. 
      #   event: tgc_1_complete
  combo_timer:                                         #8s allows for a little ball bounce
    start_value: 10
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - action: restart
        event: reset_combo_timer
    #timer_combo_timer_complete

#-----------------------------------------------------------------------------------------------

sequences:
  tiki_god_combo_1:
    events:
      - hina_ku_kanaloa_complete, ku_kane_hina_complete, lano_x3_complete, hina_kane_complete, lano_hina_complete, kanaloa_kane_complete, kane_lano_complete
    events_when_complete: tgc_1_complete
  tiki_god_combo_2:
    start_enabled: false
    enable_events: tgc_1_complete
    events:
      - hina_ku_kanaloa_complete, ku_kane_hina_complete, lano_x3_complete, hina_kane_complete, lano_hina_complete, kanaloa_kane_complete, kane_lano_complete
    events_when_complete: finished_tiki_gods_complete

#-----------------------------------------------------------------------------------------------

show_player:
  mode_tiki_god_combo_started:  
    god_inserts_blink:   #in show folder
      speed: 20
      loops: -1
    tikigod_sides:
      speed: 5
      loops: -1    

  tgc_1_complete:
    god_inserts_blink:
      speed: 20
      loops: -1

  timer_combo_timer_complete:
    god_inserts_blink:
      speed: 20
      loops: -1

  s_hina_active:
    god_inserts_blink:  
      action: stop
  s_ramp_back_active:
    god_inserts_blink:
      action: stop
  s_left_ramp_active:
    god_inserts_blink:
      action: stop
  s_loop_top_active:
    god_inserts_blink:
      action: stop
  s_loop_left_active:
    god_inserts_blink:
      action: stop
  
# replaced "show" with new showcreator shows 

  ramp_back_blinking_show:     #ku
    tgc_ku_chase:
       speed: 120
       loops: -1   
  ramp_back_blinking_show_stop:
    tgc_ku_chase:
       action: stop
  loop_top_blinking_show:      #kanaloa
    tgc_kanaloa_chase:
       speed: 120
       loops: -1
  loop_top_blinking_show_stop:
    tgc_kanaloa_chase:
       action: stop
  loop_left_blinking_show:     #kane
    tgc_kane_chase:
       speed: 120
       loops: -1   
  loop_left_blinking_show_stop:
    tgc_kane_chase:
      action: stop        
  hina_blinking_show:          #hina
    tgc_hina_chase:
       speed: 120
       loops: -1   
  hina_blinking_show_stop:
    tgc_hina_chase:
      action: stop
  left_ramp_blinking_show:     #lano           
    tgc_lano_chase:
       speed: 120
       loops: -1      
  left_ramp_blinking_show_stop:          
    tgc_lano_chase:
      action: stop

#-----------------------------------------------------------------------------------------------

widget_player:
  mode_tiki_god_combo_started:
    tikigodcombo:
      slide: base
    tikigodcombo_show:
      slide: base
    tiki_god_timer:
      slide: base

#-----------------------------------------------------------------------------------------------

sound_player:
  mode_tiki_god_combo_started:
    coconut_nut_df:
      bus: music
      action: play
      loops: 0                  #no loop, made the audio track 78s

#-----------------------------------------------------------------------------------------------

variable_player:
  hina_ku_kanaloa_complete:      
    score: 15000 * current_player.pf_multiplier
  ku_kane_hina_complete:      
    score: 15000 * current_player.pf_multiplier
  lano_x3_complete:      
    score: 10000 * current_player.pf_multiplier
  hina_kane_complete:      
    score: 10000 * current_player.pf_multiplier
  lano_hina_complete:      
    score: 10000 * current_player.pf_multiplier
  kanaloa_kane_complete:      
    score: 10000 * current_player.pf_multiplier
  kane_lano_complete:      
    score: 10000 * current_player.pf_multiplier

  tgc_2_complete:
    score: 100000 * current_player.pf_multiplier

#-----------------------------------------------------------------------------------------------

ball_saves:
  tikigod_save:
    active_time: 8s
    timer_start_events: mode_tiki_god_combo_started
    balls_to_save: 1
    early_ball_save_events: s_outer_left_active, s_outer_right_active

