  ball_started:         #end of ball bonus - this resets all my Godot variables
    pop_hits:
      action: set
      int: 0
    target_hits:
      action: set
      int: 0
    switch_hits:
      action: set
      int: 0
    pop_bonus_total:
      action: set
      int: 0
    target_bonus_total:
      action: set
      int: 0
    switch_bonus_total:
      action: set
      int: 0
    bonus_total_total:
      action: set
      int: 0

  pop_hit:             #end of ball bonus - counts the hits for the Godot variable
    pop_hits:
      int: 1
      action: add
  target_hit:
    target_hits:
      int: 1
      action: add
  switch_hit:
    switch_hits:
