#config_version=6

#base mode

mode:
  start_events: ball_will_start
  events_when_started: reset_multiball_engaged, reset_tiki_god_combo_active  #basically force reset. ball drain wasn't resetting these. 
  priority: 100

#-----------------------------------------------------------------------------------------------

slide_player:
  mode_base_started:
    base:
        action: play
    attract:
        action: remove

#-----------------------------------------------------------------------------------------------

sound_player:
  mode_base_started:
    base_music:
      bus: music
      volume: 0.75
      action: play
      loops: -1
  play_base_music_again:
    base_music:
      bus: music
      volume: 0.75
      action: play
      loops: -1

#-----------------------------------------------------------------------------------------------

show_player:
  mode_base_started:       #event calls show created in showcreator and in shows folder
    captive_blink:            #show name
      speed: 25                  #show speed (did not adjust in showcreator)
      loops: -1                        #keeps looping with -1             
    01girl:
      speed: 10
      loops: -1
    02fire:
      speed: 15
      loops: -1
    03catbirds:
      speed: 6
      loops: -1
    04tikitapu:
      speed: 2
      loops: -1
    05volcano:
      speed: 3
      loops: -1
    06birds:
      speed: 6
      loops: -1
    # 07torches:
    #   speed: 15
    #   loops: -1
    08guys:
      speed: 5
      loops: -1
    pf_gi_yellow:
      speed: 5
      loops: -1
    side_fire_gi:
      speed: 8
      loops: -1  
    apron_water:
      speed: 6
      loops: -1

  mode_mode_qualifier_started:
    captive_blink:
      speed: 25
      loops: -1 
      
  captive_counter_full:
    captive_blink:
      action: stop           #stops show when event triggered
  mode_mode_qualifier_stopped:
    captive_blink:
      action: stop    
  balldevice_bd_scoop_ball_entered:
    captive_blink:
      speed: 25
      loops: -1
  ball_save_ball_save_timer_start:
    ballsave_blink:
      speed: 25
      loops: -1

  ball_save_ball_save_disabled:
    ballsave_blink:
      action: stop

  sneaki_skillshot_hit:
    updown_side_skill1:
      speed: 150
      loops: 1

  kane_skillshot_hit:
    updown_side_skillkane:
      speed: 150
      loops: 1

  volcano_skillshot_hit:
    updown_side_skillvolcano:
      speed: 150
      loops: 1  

  award_hurry_up_score:
    hula_spin_ccw:            #hula servo
      loops: 0                # run once

#-----------------------------------------------------------------------------------------------

ball_saves:
  ball_save:
    active_time: 12s
    hurry_up_time: 3s
    timer_start_events: balldevice_bd_trough_ball_eject_success
    balls_to_save: 1
    early_ball_save_events: s_outer_left_active, s_outer_right_active

#-----------------------------------------------------------------------------------------------

timers:                                              
  kicker_delay:                                       #linked to bd_kicker in confg
    start_value: 0
    end_value: 3
    tick_interval: 1s
    control_events:
      - action: restart
        event: multiball_sneaki_tiki_mb_started
      - action: restart
        event: sneaki_skillshot_hit
      - action: restart
        event: kick_the_kicker       

  scoop_delay:                                       #linked to bd_scoop in confg
    start_value: 0
    end_value: 2
    tick_interval: 1s
    control_events:
      - action: restart
        event: scoop_the_scooper

#-----------------------------------------------------------------------------------------------

event_player:
  balldevice_bd_kicker_ejecting_ball{not device.timers.kicker_delay.running}: kick_the_kicker            #linked to timers - kicker_delay
  timer_kicker_delay_complete: kick_the_kicker

  sw_bonus_pop_active: pop_hit                    #linked to bonus mode for tracking hits (also bonus_pop is a tags added in the switches.yaml)
  sw_bonus_target_active: target_hit
  sw_bonus_switch_active: switch_hit

#-----------------------------------------------------------------------------------------------

widget_player:

  ball_save_ball_save_saving_ball:
    ball_save:
      slide: base
      expire: 3s
      
  award_hurry_up_score:
    bop_volcano_points:
      slide: base
      expire: 5s

  sneaki_skillshot_lit_hit:
    skillsneaki:
      slide: base
      expire: 5
  kane_skillshot_lit_hit:
    skillkane:
      slide: base
      expire: 5
  volcano_skillshot_lit_hit:
    skillvolcano:
      slide: base
      expire: 5

#-----------------------------------------------------------------------------------------------

variable_player:

  set_multiball_engaged:   #jim added this for MB conditional 212 to 219
    multiball_engaged:     # all MB need this in the events when started/stopped check other MB code
      action: set
      int: 1
  reset_multiball_engaged:
    multiball_engaged:
      action: set
      int: 0

  set_tiki_god_combo_active:           #all these set and reset are for the guarded_open_trap_door
    tiki_god_combo_active:             #linked to player var in config and modes
      action: set
      int: 1
  reset_tiki_god_combo_active:
    tiki_god_combo_active:
      action: set
      int: 0

  # set_tiki_tapu_mb_active:
  #   tiki_tapu_mb_active:
